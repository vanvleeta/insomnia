<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Insomnia — Coverage Dashboard</title>
  <link rel="icon" type="image/png" href="img/eye_for_dark_mode.png">
  <link rel="stylesheet" href="css/insomnia.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
  <script type="module" src="js/app.js"></script>
  <script type="module">
    import { renderDashboard } from './js/dashboard.js';
    // Library-only mode: if no PCR source is configured, the Dashboard view
    // would be mostly empty, so redirect to Techniques as the landing page.
    // We do this as early as possible to avoid a render-flash.
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const r = await fetch('sources.json', { cache: 'no-cache' });
        const sources = await r.json();
        const hasPcr = Array.isArray(sources) && sources.some(s => s && s.Type === 'PCR');
        if (!hasPcr) {
          window.location.replace('techniques.html');
          return;
        }
      } catch (_) {
        // If we can't read the config, fall through and let renderDashboard
        // show its own error.
      }
      renderDashboard(document.getElementById('app'));
    });
  </script>
</head>
<body>
  <header class="header">
    <div class="header-logo" aria-hidden="true">
      <img class="eye-dark"  src="img/eye_for_dark_mode.png"  alt="">
      <img class="eye-light" src="img/eye_for_light_mode.png" alt="">
    </div>
    <div class="header-title">
      <div class="brand-name">INSOMNIA</div>
      <div class="tagline">the things that keep you up at night</div>
    </div>
    <nav class="header-nav" aria-label="Primary">
      <a class="nav-link active" href="index.html">Dashboard</a>
      <a class="nav-link"        href="techniques.html">Techniques</a>
      <a class="nav-link"        href="matrix.html">Matrix</a>
    </nav>
    <div class="header-right">
      <div class="header-meta" id="header-meta">
        <span class="dot" title="Live"></span>
        <span id="header-last-sync">sources synced just now</span>
      </div>
      <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme">
        <i class="ti ti-sun"></i>
      </button>
    </div>
  </header>
  <main class="main" id="app"></main>
</body>
</html>
